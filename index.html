<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova Interior Design Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#efefef;
    color:#a16f6f;
}

.container{
    width:90%;
    max-width:1200px;
    margin:auto;
}

header{
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

header .container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
}

.logo{
    font-size:30px;
    color:#8B5E3C;
    font-weight:700;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:.3s;
}

nav ul li a:hover{
    color:#8B5E3C;
}

.hero{
    height:100vh;
    background:url("images/hero.jpg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    color:white;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.55);
}

.hero-content{
    position:relative;
    z-index:2;
    max-width:700px;
}

.hero h1{
    font-size:60px;
    margin-bottom:20px;
}

.hero p{
    font-size:18px;
    margin-bottom:30px;
}
img{
    width: 100%;
    height:auto;
}

.btn{
    display:inline-block;
    background:#8B5E3C;
    color:white;
    padding:15px 35px;
    text-decoration:none;
    border-radius:30px;
    transition:.3s;
}

.btn:hover{
    background:#6f472d;
}

section{
    padding:90px 0;
}

h2{
    text-align:center;
    color:#8B5E3C;
    margin-bottom:40px;
    font-size:36px;
}

</style>

</head>

<body>

<header>

<div class="container">

<div class="logo">
Nova Interior
</div>

<nav>

<ul>

<li><a href="about.html">About</a></li>

<li><a href="Team.html">Team</a></li>

<li><a href="help.html">Help</a></li>

</ul>

</nav>

</div>

</header>

<section class="hero">

<div class="hero-content">
<h1>Design Your Dream Space</h1>

<p>
Modern Interior Design Solutions for Homes, Offices,
Restaurants and Commercial Spaces.
</p>

<a href="booking.html" class="btn">
Book Consultation
</a>

</div>

</section>
