<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Interior Design Studio | Booking</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#8B5E3C;
    color:#fff;
    padding:20px;
    text-align:center;
}

nav{
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

nav a:hover{
    color:gold;
}

.container{
    width:90%;
    max-width:700px;
    margin:40px auto;
}

form{
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

fieldset{
    border:2px solid #8B5E3C;
    padding:20px;
    border-radius:10px;
}

legend{
    color:#8B5E3C;
    font-size:22px;
    font-weight:bold;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:vertical;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:#8B5E3C;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:17px;
}

button:hover{
    background:#6e472b;
}

footer{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>Nova Interior Design Studio</h1>

<nav>
<a href="index.html">Home</a>
<a href="gallery.html">Gallery</a>
<a href="booking.html">Booking</a>
<a href="about.html">About</a>
<a href="Team.html">team</a>
<a href="help.html">Help</a>
</nav>

</header>

<div class="container">

<form>

<fieldset>

<legend>Book Your Interior Design Consultation</legend>

<label for="name">Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label for="phone">Phone Number</label>
<input type="tel" id="phone" placeholder="Enter your phone number" required>

<label for="design">Design Type</label>

<select id="design" required>

<option value="">Select Design</option>

<option>Living Room</option>

<option>Bedroom</option>

<option>Kitchen</option>

<option>Office</option>

<option>Restaurant</option>

<option>Hotel</option>

</select>

<label>Gender</label>

<div class="radio-group">

<input type="radio" id="male" name="gender" required>
<label for="male">Male</label>

<input type="radio" id="female" name="gender">
<label for="female">Female</label>

</div>

<label for="message">Comments</label>

<textarea id="message" rows="5" placeholder="Write your message here..."></textarea>

<button type="submit">Book Now</button>

</fieldset>

</form>

</div>

<footer>

<p>&copy; 2026 Nova Interior Design Studio. All Rights Reserved.</p>

</footer>

</body>
</html>
